# Build a self-contained Linux binary bundle and attach it to the GitHub
# release. The bundle includes the Julia runtime and a sysimage with the
# full precompile workload, so consumers (e.g. plotting workflows) need no
# Julia installation — just OpenGL (xvfb on CI) and glibc >= the build
# runner's (ubuntu-22.04: glibc 2.35).
#
# Triggers: pushing a tag `v*` builds and uploads to that release;
# manual dispatch builds and uploads a workflow artifact for testing.
name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  linux-app:
    name: Linux x86_64 bundle
    runs-on: ubuntu-22.04
    timeout-minutes: 240
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      - uses: julia-actions/cache@v2
      - name: Install headless OpenGL (for GLMakie)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb mesa-utils libgl1 x11-xserver-utils \
            xorg-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libxext-dev zstd
      # A single X server for the whole job: precompilation already needs a
      # display (GLFW initializes when GLMakie loads), not just create_app.
      - name: Start virtual display
        run: |
          Xvfb :99 -screen 0 1024x768x24 &
          echo "DISPLAY=:99" >> "$GITHUB_ENV"
      # Native-code emission peaks well above the runner's 16 GB RAM and the
      # stock 4 GB swapfile; without this the VM gets OOM-killed (exit 143).
      - name: Grow swap for sysimage emission
        run: |
          sudo swapoff -a
          sudo rm -f /mnt/swapfile
          sudo fallocate -l 24G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h
      - name: Build self-contained app bundle
        env:
          # 2, not all 4 cores: each emission thread holds multi-GB of LLVM
          # state, and 4 threads killed the 16 GB runner VM even with a
          # 16 GB swapfile (the run dies with no step conclusion and no
          # uploaded logs). Slower, but it fits.
          JULIA_IMAGE_THREADS: '2'
          # create_app precompiles everything against its own base sysimage
          # (with --pkgimages=no), so precompiling on instantiate is wasted
          # work — the caches are never reused.
          JULIA_PKG_PRECOMPILE_AUTO: '0'
        run: |
          set -o pipefail
          julia --project=. -e 'using Pkg; Pkg.instantiate()'
          julia --project=build -e 'using Pkg; Pkg.develop(path="."); Pkg.instantiate()'
          julia --project=build -e '
            using PackageCompiler
            create_app(".", "dist";
              executables = ["cdfviewer" => "julia_main"],
              precompile_execution_file = "precompile_script.jl",
              include_lazy_artifacts = true,
            )' 2>&1 | tee build.log
          # The workload never fails precompilation (by design, for package
          # installs) — but a release binary built without it would hitch on
          # first use, so treat the warning as a build failure here.
          if grep -q "precompile workload failed" build.log; then
            echo "::error::CDFViewer precompile workload failed during the sysimage build"
            exit 1
          fi
      - name: Smoke test the bundle from a clean location
        run: |
          julia --project=. -e 'include("docs/demo_data.jl"); create_demo_file("/tmp")'
          cp -r dist /tmp/relocated
          /tmp/relocated/bin/cdfviewer /tmp/demo.nc \
            -v temperature -x lon -y lat -p heatmap \
            --savefig -s 'filename="/tmp/smoke.png"'
          test -s /tmp/smoke.png
      - name: Pack
        run: |
          mv dist cdfviewer
          tar --zstd -cf cdfviewer-linux-x86_64.tar.zst cdfviewer
          ls -lh cdfviewer-linux-x86_64.tar.zst
      - name: Upload to the GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes || true
          gh release upload "$GITHUB_REF_NAME" cdfviewer-linux-x86_64.tar.zst --clobber
      - name: Upload as workflow artifact (manual test runs)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: cdfviewer-linux-x86_64
          path: cdfviewer-linux-x86_64.tar.zst
