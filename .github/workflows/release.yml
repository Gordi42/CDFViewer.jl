# Build a self-contained Linux binary bundle and attach it to the GitHub
# release. The bundle includes the Julia runtime and a sysimage with the
# full precompile workload, so consumers (e.g. plotting workflows) need no
# Julia installation — just OpenGL (xvfb on CI) and glibc >= the build
# runner's (ubuntu-22.04: glibc 2.35).
#
# Triggers: pushing a tag `v*` builds and uploads to that release;
# manual dispatch builds and uploads a workflow artifact for testing.
name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  linux-app:
    name: Linux x86_64 bundle
    runs-on: ubuntu-22.04
    timeout-minutes: 240
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      - uses: julia-actions/cache@v2
      - name: Install headless OpenGL (for GLMakie)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb mesa-utils libgl1 x11-xserver-utils \
            xorg-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libxext-dev zstd
      - name: Build self-contained app bundle
        env:
          # All 4 runner cores for the native-code emission phase (16 GB RAM)
          JULIA_IMAGE_THREADS: '4'
        run: |
          julia --project=. -e 'using Pkg; Pkg.instantiate()'
          julia --project=build -e 'using Pkg; Pkg.develop(path="."); Pkg.instantiate()'
          xvfb-run -s '-screen 0 1024x768x24' julia --project=build -e '
            using PackageCompiler
            create_app(".", "dist";
              executables = ["cdfviewer" => "julia_main"],
              precompile_execution_file = "precompile_script.jl",
              include_lazy_artifacts = true,
            )'
      - name: Smoke test the bundle from a clean location
        run: |
          julia --project=. -e 'include("docs/demo_data.jl"); create_demo_file("/tmp")'
          cp -r dist /tmp/relocated
          xvfb-run -s '-screen 0 1024x768x24' /tmp/relocated/bin/cdfviewer /tmp/demo.nc \
            -v temperature -x lon -y lat -p heatmap \
            --savefig -s 'filename="/tmp/smoke.png"'
          test -s /tmp/smoke.png
      - name: Pack
        run: |
          mv dist cdfviewer
          tar --zstd -cf cdfviewer-linux-x86_64.tar.zst cdfviewer
          ls -lh cdfviewer-linux-x86_64.tar.zst
      - name: Upload to the GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes || true
          gh release upload "$GITHUB_REF_NAME" cdfviewer-linux-x86_64.tar.zst --clobber
      - name: Upload as workflow artifact (manual test runs)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: cdfviewer-linux-x86_64
          path: cdfviewer-linux-x86_64.tar.zst
