name: CI

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    # Weekly run to catch breakage from new dependency releases
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  test:
    name: Julia ${{ matrix.julia-version }} - ${{ github.event_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        julia-version: ['1.12']
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}
      - uses: julia-actions/cache@v2
      - name: Install headless OpenGL (for GLMakie)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb mesa-utils libgl1 x11-xserver-utils \
            xorg-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev
      - uses: julia-actions/julia-runtest@v1
        with:
          prefix: xvfb-run -s '-screen 0 1024x768x24'

  # Build the documentation and deploy it to GitHub Pages. Screenshots and
  # REPL transcripts are generated by running the app headlessly (xvfb),
  # so they always match the code.
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      - uses: julia-actions/cache@v2
      - name: Install headless OpenGL (for GLMakie)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb mesa-utils libgl1 x11-xserver-utils \
            xorg-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev
      - uses: julia-actions/julia-docdeploy@v1
        with:
          prefix: xvfb-run -s '-screen 0 1024x768x24'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Weekly canary: does the package still work with the newest dependency
  # versions (ignoring the committed Manifest)?
  test-latest-deps:
    name: Latest dependencies
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - name: Install headless OpenGL (for GLMakie)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb mesa-utils libgl1 x11-xserver-utils \
            xorg-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev
      - name: Update to latest dependency versions
        run: julia --project=. -e 'using Pkg; Pkg.update()'
      - uses: julia-actions/julia-runtest@v1
        with:
          prefix: xvfb-run -s '-screen 0 1024x768x24'
